{% extends 'base.html' %}
{% block content %}
<h1 class="h3 mb-3">Nueva venta</h1>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="post" class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Cliente</label>
                <select class="form-select" name="cliente_id" required>
                    <option value="">Seleccionar...</option>
                    {% for cliente in clientes %}
                    <option value="{{ cliente.id }}">{{ cliente.nombre_completo }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Producto</label>
                <select class="form-select" name="producto_id" required>
                    <option value="">Seleccionar...</option>
                    {% for producto in productos %}
                    <option value="{{ producto.id }}">{{ producto.nombre }} - {{ producto.cantidad_sesiones }} sesiones - ${{ '%.2f'|format(producto.precio) }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Fecha y hora</label>
                <input class="form-control" type="datetime-local" name="fecha">
            </div>
            <div class="col-md-4">
                <label class="form-label">Medio de pago</label>
                <select class="form-select" name="medio_pago" required>
                    <option value="efectivo">Efectivo</option>
                    <option value="transferencia">Transferencia</option>
                    <option value="tarjeta">Tarjeta</option>
                    <option value="mercado_pago">Mercado Pago</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Monto pagado</label>
                <input class="form-control" type="number" min="0" step="0.01" name="monto" required>
            </div>
            <div class="col-12 d-flex gap-2">
                <button class="btn btn-primary" type="submit">Guardar venta</button>
                <a class="btn btn-outline-secondary" href="{{ url_for('ventas.listar') }}">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
