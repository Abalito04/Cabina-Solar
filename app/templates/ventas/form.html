{% extends 'base.html' %}
{% block content %}
<h1 class="h3 mb-3">Nueva venta</h1>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="post" class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Cliente</label>
                <select class="form-select" name="cliente_id" required>
                    <option value="">Seleccionar...</option>
                    {% for cliente in clientes %}
                    <option value="{{ cliente.id }}"
                        {% if cliente_preseleccionado and cliente_preseleccionado == cliente.id %}selected{% endif %}>
                        {{ cliente.nombre_completo }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Producto</label>
                <select class="form-select" name="producto_id" required>
                    <option value="">Seleccionar...</option>
                    {% for producto in productos %}
                    <option value="{{ producto.id }}">
                        {{ producto.nombre }} — {{ producto.cantidad_sesiones }} sesiones — ${{ '%.2f'|format(producto.precio) }}
                    </option>
                    {% endfor %}
                </select>
            </div>
                        <div class="col-md-6">
                <label class="form-label">Medio de pago</label>
                <select class="form-select" name="medio_pago" id="medio_pago" required onchange="toggleComprobante()">
                    <option value="efectivo">Efectivo</option>
                    <option value="transferencia">Transferencia / MercadoPago</option>
                    <option value="tarjeta">Tarjeta</option>
                </select>
            </div>
            <!-- Campo que aparece solo cuando se elige Transferencia -->
            <div class="col-md-6" id="campo_comprobante" style="display:none;">
                <label class="form-label">Nro. / Comprobante de transferencia</label>
                <input class="form-control" name="comprobante" id="comprobante" placeholder="Ej: 00123456 o descripción">
            </div>

            <script>
            function toggleComprobante() {
                const medio = document.getElementById('medio_pago').value;
                const campo = document.getElementById('campo_comprobante');
                campo.style.display = (medio === 'transferencia') ? 'flex' : 'none';
            }
            </script>
            <div class="col-md-6">
                <label class="form-label">Monto pagado</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input class="form-control" type="number" min="0" step="0.01" name="monto" placeholder="0.00" required>
                </div>
            </div>
            <div class="col-12 d-flex gap-2">
                <button class="btn btn-primary" type="submit">Guardar venta</button>
                <a class="btn btn-outline-secondary" href="{{ url_for('ventas.listar') }}">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
